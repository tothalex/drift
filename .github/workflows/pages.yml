name: Pages

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Creates the Pages site on first run, so no manual settings step.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp install.sh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
