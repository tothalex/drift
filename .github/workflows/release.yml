name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: drift-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: drift-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: drift-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: drift-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: drift-windows-x86_64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "error: tag $GITHUB_REF_NAME doesn't match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # zig cross-compiles the tree-sitter grammars' C code for musl
      # targets without a cross-gcc toolchain.
      - name: Install Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release drift

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          7z a ${{ matrix.name }}.zip ./target/${{ matrix.target }}/release/drift.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: shasum -a 256 drift-*.tar.gz drift-*.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            drift-*.tar.gz drift-*.zip checksums.txt
